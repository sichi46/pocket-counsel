name: Dependency Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"

jobs:
  # Update dependencies
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated dependencies
        id: outdated
        run: |
          pnpm outdated --format=json > outdated.json
          if [ -s outdated.json ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update dependencies
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          # Update all dependencies to latest versions
          pnpm update --latest

          # Update lockfile
          pnpm install

      - name: Run tests after update
        if: steps.outdated.outputs.has_updates == 'true'
        run: pnpm test

      - name: Create pull request
        if: steps.outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "🤖 Automated dependency updates"
          body: |
            ## 🤖 Automated Dependency Updates

            This PR was automatically created to update outdated dependencies.

            ### Changes
            - Updated all dependencies to their latest versions
            - All tests are passing ✅

            ### Manual Review Required
            - [ ] Review the changes
            - [ ] Test the application manually
            - [ ] Merge if everything looks good

            ---
            *This PR was created by the automated dependency update workflow*
          branch: chore/update-dependencies
          delete-branch: true
          labels: |
            dependencies
            automated
            bot

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Notify about updates
  notify-updates:
    name: Notify Updates
    runs-on: ubuntu-latest
    needs: [update-dependencies, security-audit]
    if: always()
    steps:
      - name: Notify Slack about dependency updates
        if: needs.update-dependencies.outputs.has_updates == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: "#devops"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            🔄 Dependency updates available
            📦 New versions of packages are ready for review
            🔗 PR: ${{ needs.update-dependencies.outputs.pull_request_url }}

      - name: Notify about security issues
        if: needs.security-audit.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#security"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            ⚠️ Security vulnerabilities detected
            🔍 Please review the security audit results
            🚨 Immediate attention required
