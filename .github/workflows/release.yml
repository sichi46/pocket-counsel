name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"

jobs:
  # Create release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from conventional commits
          npx conventional-changelog-cli@latest --version
          npx conventional-changelog-cli@latest --release-count 0 --output changelog.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  # Build and upload release assets
  build-release:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create release archive
        run: |
          tar -czf pocket-counsel-${{ github.ref_name }}.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=dist \
            .

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./pocket-counsel-${{ github.ref_name }}.tar.gz
          asset_name: pocket-counsel-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

  # Notify stakeholders
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-release]
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: "#releases"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            🚀 New Release: ${{ github.ref_name }}
            📝 Release notes: ${{ needs.create-release.outputs.html_url }}

      - name: Notify email (optional)
        if: ${{ secrets.EMAIL_NOTIFICATION_ENABLED == 'true' }}
        run: |
          # Add email notification logic here
          echo "Release notification sent to stakeholders"
