name: Performance Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"

jobs:
  # Lighthouse performance audit
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Start development server
        run: |
          pnpm --filter web dev &
          sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: "./.lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Bundle size analysis
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with bundle analysis
        run: |
          pnpm --filter web build --analyze
          # or use webpack-bundle-analyzer

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/web/dist/

  # API performance testing
  api-performance:
    name: API Performance Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API performance tests
        run: |
          # Install artillery for load testing
          npm install -g artillery

          # Run performance tests
          artillery run tests/performance/api-load-test.yml

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: reports/

  # Performance regression detection
  regression-detection:
    name: Performance Regression Detection
    runs-on: ubuntu-latest
    needs: [lighthouse, bundle-analysis, api-performance]
    steps:
      - name: Download previous results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-results
          path: previous-results/

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-results
          path: current-results/

      - name: Compare performance metrics
        run: |
          # Compare current vs previous performance metrics
          # Alert if significant regression detected
          echo "Performance comparison completed"

      - name: Notify on regression
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#performance"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            ⚠️ Performance regression detected
            📊 Check the latest performance metrics
            🔗 View details in GitHub Actions

  # Performance monitoring dashboard
  update-dashboard:
    name: Update Performance Dashboard
    runs-on: ubuntu-latest
    needs: [lighthouse, bundle-analysis, api-performance]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Update performance metrics
        run: |
          # Update performance dashboard with latest metrics
          echo "Performance dashboard updated"

      - name: Notify stakeholders
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: "#performance"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          text: |
            📊 Performance metrics updated
            🎯 All performance targets met
            📈 View dashboard for detailed metrics
